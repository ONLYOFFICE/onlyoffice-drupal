name: 'ONLYOFFICE Connector'
type: module
description: 'Allows in-browser document editing from the Drupal Media module with ONLYOFFICE Docs. Requires a separate installation of ONLYOFFICE Docs (Document Server).'
core_version_requirement: ^10
package: ONLYOFFICE
configure: onlyoffice.settings_form
dependencies:
  - drupal:media

'interface translation project': onlyoffice
'interface translation server pattern': modules/contrib/onlyoffice-drupal/translations/onlyoffice.%language.po
